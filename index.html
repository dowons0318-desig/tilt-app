<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기울기 산정</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#f4f6fa;
    font-size:11px;
}

.wrapper{
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* ===== 입력 영역 고정 ===== */
.inputArea{
    position:fixed;
    top:0;
    left:0;
    right:0;
    background:#fff;
    padding:8px;
    border-bottom:1px solid #ccc;
    z-index:10;
}

/* ===== 표 기본 ===== */
table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

th,td{
    border:1px solid #bbb;
    padding:4px;
    text-align:center;
}

/* ===== 입력창 ===== */
input{
    width:100%;
    padding:4px;
    text-align:center;
    font-size:11px;
    box-sizing:border-box;   /* 🔥 표 밖으로 안나가게 */
}

/* 숫자 증감 버튼 제거 */
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{
    -webkit-appearance:none;
    margin:0;
}
input[type=number]{
    -moz-appearance:textfield;
}

/* ===== 버튼 ===== */
.btnRow{
    display:flex;
    gap:8px;
    margin-top:8px;
}

.btnRow button{
    flex:1;
    padding:10px 0;
    font-weight:bold;
    border:none;
    border-radius:6px;
    color:#fff;
    font-size:12px;
}

.add{background:#2b78c5;}
.delete{background:#c62828;}
.reset{background:#444;}

/* ===== 결과 영역 (입력 바로 아래 한칸 간격) ===== */
.resultArea{
    margin-top:195px;   /* 🔥 간격 최소화 */
    overflow-y:auto;
    flex:1;
    padding:6px;
}

.resultHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:4px;
}

.small{font-size:9px;}

.resultRow{
    cursor:pointer;
}

.detailRow{
    background:#eef3ff;
    font-size:9px;
    text-align:left;
}
</style>
</head>

<body>
<div class="wrapper">

<div class="inputArea">

<table>
<tr>
<th rowspan="2">지점</th>
<th rowspan="2">거리</th>
<th rowspan="2">구분</th>
<th colspan="3">수직</th>
<th colspan="3">수평</th>
</tr>
<tr>
<th>°</th><th>′</th><th>″</th>
<th>°</th><th>′</th><th>″</th>
</tr>

<tr>
<td rowspan="2"><input id="point"></td>
<td rowspan="2"><input type="number" id="distance" inputmode="decimal"></td>
<td>Top</td>
<td><input type="number" id="vU_d" inputmode="numeric"></td>
<td><input type="number" id="vU_m" inputmode="numeric"></td>
<td><input type="number" id="vU_s" inputmode="numeric"></td>
<td><input type="number" id="hU_d" inputmode="numeric"></td>
<td><input type="number" id="hU_m" inputmode="numeric"></td>
<td><input type="number" id="hU_s" inputmode="numeric"></td>
</tr>

<tr>
<td>Bot</td>
<td><input type="number" id="vL_d" inputmode="numeric"></td>
<td><input type="number" id="vL_m" inputmode="numeric"></td>
<td><input type="number" id="vL_s" inputmode="numeric"></td>
<td><input value="0" readonly></td>
<td><input value="0" readonly></td>
<td><input value="0" readonly></td>
</tr>
</table>

<div class="btnRow">
<button class="add" onclick="addData()">추가</button>
<button class="delete" onclick="deleteSelected()">삭제</button>
<button class="reset" onclick="resetAll()">초기화</button>
</div>

</div>

<div class="resultArea">

<div class="resultHeader">
<div>
<b>결과</b>
<span class="small">(우측 + / 좌측 -)</span>
</div>
<div class="small">(단위:m)</div>
</div>

<table id="resultTable">
<tr>
<th>✔</th>
<th>지점</th>
<th>조사높이</th>
<th>Δl</th>
<th>기울기</th>
<th>등급</th>
</tr>
</table>

</div>
</div>

<script>
let dataList=JSON.parse(localStorage.getItem("slopeData")||"[]");

function save(){
localStorage.setItem("slopeData",JSON.stringify(dataList));
}

function rad(d){return d*Math.PI/180}
function dms(d,m,s){
return (parseFloat(d)||0)+(parseFloat(m)||0)/60+(parseFloat(s)||0)/3600
}

function addData(){
try{
let P=point.value.trim();
if(!P) throw "지점 입력";
if(dataList.some(d=>d.point===P)) throw "중복 지점";

let D=parseFloat(distance.value);
if(!D) throw "거리 오류";

let vU=dms(vU_d.value,vU_m.value,vU_s.value);
let vL=dms(vL_d.value,vL_m.value,vL_s.value);
let hU=rad(dms(hU_d.value,hU_m.value,hU_s.value));

let aU=rad(90-vU);
let aL=rad(90-vL);

let dH=D*(Math.tan(aU)-Math.tan(aL));
let dX=D*Math.tan(hU);
let slope=(Math.abs(dX)>0.000001)? dH/dX:0;

let 조사높이=(Math.round(dH*1000)/1000).toFixed(3);
let deltaL=(Math.round(dX*1000)/1000).toFixed(3);

let slopeInt=Math.round(slope);
if(slopeInt>0) slopeInt="+"+slopeInt;

let grade="A";
let A=Math.abs(slope);
if(A<750) grade="B";
if(A<500) grade="C";
if(A<250) grade="D";
if(A<150) grade="E";
if(slope==0) grade="A";

dataList.push({
point:P,조사높이,deltaL,slope:slopeInt,grade,
input:{
distance:D,
vU:{d:vU_d.value,m:vU_m.value,s:vU_s.value},
vL:{d:vL_d.value,m:vL_m.value,s:vL_s.value},
hU:{d:hU_d.value,m:hU_m.value,s:hU_s.value}
}
});

dataList.sort((a,b)=>
a.point.localeCompare(b.point,'ko',{numeric:true})
);

save();
render();
clearInputs();

}catch(e){alert(e);}
}

function render(){
let t=resultTable;
t.innerHTML="<tr><th>✔</th><th>지점</th><th>조사높이</th><th>Δl</th><th>기울기</th><th>등급</th></tr>";

dataList.forEach((d,i)=>{
let r=t.insertRow();
r.className="resultRow";

r.insertCell(0).innerHTML=`<input type="checkbox" value="${d.point}" onclick="event.stopPropagation()">`;
r.insertCell(1).innerHTML=d.point;
r.insertCell(2).innerHTML=d.조사높이;
r.insertCell(3).innerHTML=d.deltaL;
r.insertCell(4).innerHTML=d.slope;
r.insertCell(5).innerHTML=d.grade;

r.onclick=()=>toggleDetail(i);
});
}

function toggleDetail(i){
let existing=document.getElementById("detail"+i);
if(existing){existing.remove();return;}

let d=dataList[i];
let row=resultTable.insertRow(i+2);
row.id="detail"+i;
row.className="detailRow";

let cell=row.insertCell(0);
cell.colSpan=6;

cell.innerHTML=
"<b>산출 입력값</b><br>"+
"거리: "+d.input.distance+"<br>"+
"수직 Top: "+d.input.vU.d+"° "+d.input.vU.m+"′ "+d.input.vU.s+"″<br>"+
"수직 Bot: "+d.input.vL.d+"° "+d.input.vL.m+"′ "+d.input.vL.s+"″<br>"+
"수평 Top: "+d.input.hU.d+"° "+d.input.hU.m+"′ "+d.input.hU.s+"″";
}

function deleteSelected(){
let selected=[...resultTable.querySelectorAll("input[type='checkbox']:checked")].map(cb=>cb.value);
if(selected.length===0){alert("삭제 선택");return;}
dataList=dataList.filter(d=>!selected.includes(d.point));
save();
render();
}

function resetAll(){
if(confirm("전체 삭제?")){
dataList=[];
save();
render();
}
}

function clearInputs(){
document.querySelectorAll(".inputArea input").forEach(i=>{
if(!i.readOnly)i.value="";
});
}

render();
</script>

</body>
</html>
