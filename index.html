<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기울기 측정</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f4f6f8;
    margin:0;
    padding:6px;
    font-size:12px;
}

/* 🔹 공통 표 설정 */
.table-wrap{
    width:100%;
    max-width:100%;
}

table{
    width:100%;
    table-layout:fixed;   /* 🔥 폭 강제 고정 */
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ccc;
    padding:4px 2px;
    text-align:center;
    font-size:12px;
    word-break:keep-all;
}

input{
    width:100%;
    box-sizing:border-box;
    padding:4px;
    font-size:12px;
    text-align:center;
    border:1px solid #ccc;
    background:white;
}

input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{
    -webkit-appearance:none;
    margin:0;
}
input[type=number]{ -moz-appearance:textfield; }

.btn-row{
    display:flex;
    gap:6px;
    margin-top:6px;
}
.btn-row button{
    flex:1;
    padding:8px 0;
    font-size:13px;
    border:none;
    border-radius:6px;
    font-weight:bold;
}
.add{background:#1976d2;color:white;}
.delete{background:#c62828;color:white;}
.reset{background:#424242;color:white;}

.result-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:8px;
}

.header-left{
    display:flex;
    gap:6px;
    align-items:center;
}

.note{font-size:10px;color:#666;}
.unit{font-size:11px;color:#555;}
</style>
</head>

<body>

<h3>📐 기울기 입력</h3>

<div class="table-wrap">
<table>
<tr>
<th rowspan="2">지점</th>
<th rowspan="2">거리</th>
<th rowspan="2">구분</th>
<th colspan="3">수직</th>
<th colspan="3">수평</th>
</tr>
<tr>
<th>°</th><th>′</th><th>″</th>
<th>°</th><th>′</th><th>″</th>
</tr>

<tr>
<td rowspan="2"><input id="point"></td>
<td rowspan="2"><input type="number" id="distance" step="0.001"></td>
<td>Top</td>
<td><input id="vU_d" type="number"></td>
<td><input id="vU_m" type="number"></td>
<td><input id="vU_s" type="number"></td>
<td><input id="hU_d" type="number"></td>
<td><input id="hU_m" type="number"></td>
<td><input id="hU_s" type="number"></td>
</tr>

<tr>
<td>Bot</td>
<td><input id="vL_d" type="number"></td>
<td><input id="vL_m" type="number"></td>
<td><input id="vL_s" type="number"></td>
<td><input value="0" readonly></td>
<td><input value="0" readonly></td>
<td><input value="0" readonly></td>
</tr>
</table>
</div>

<div class="btn-row">
<button class="add" onclick="addData()">추가</button>
<button class="delete" onclick="deleteSelected()">삭제</button>
<button class="reset" onclick="resetAll()">초기화</button>
</div>

<div class="result-header">
<div class="header-left">
<h4>📊 결과</h4>
<div class="note">(우측 "+", 좌측 "-")</div>
</div>
<div class="unit">(단위 : m)</div>
</div>

<div class="table-wrap">
<table id="resultTable">
<tr>
<th>✔</th>
<th>지점</th>
<th>조사높이</th>
<th>Δl</th>
<th>기울기</th>
<th>등급</th>
</tr>
</table>
</div>

<script>
let dataList=[];

function dms(d,m,s){
    return (parseFloat(d)||0) + (parseFloat(m)||0)/60 + (parseFloat(s)||0)/3600;
}
function rad(d){ return d*Math.PI/180; }

function addData(){
try{
    let P=point.value;
    let D=parseFloat(distance.value);
    if(!D) throw "거리 오류";

    let vU=dms(vU_d.value,vU_m.value,vU_s.value);
    let vL=dms(vL_d.value,vL_m.value,vL_s.value);
    let hU=rad(dms(hU_d.value,hU_m.value,hU_s.value));

    let aU=rad(90-vU);
    let aL=rad(90-vL);

    let dH=D*(Math.tan(aU)-Math.tan(aL));
    let dX=D*Math.tan(hU);

    let slope=(Math.abs(dX)>0.000001)? dH/dX : 0;

    let 조사높이=(Math.round(dH*1000)/1000).toFixed(3);
    let deltaL=(Math.round(dX*1000)/1000).toFixed(3);
    let slopeInt=Math.round(slope);
    if(slopeInt>0) slopeInt="+"+slopeInt;

    let grade="A";
    let A=Math.abs(slope);
    if(A<750) grade="B";
    if(A<500) grade="C";
    if(A<250) grade="D";
    if(A<150) grade="E";

    dataList.push({ point:P, 조사높이, deltaL, slope:slopeInt, grade });
    render();

}catch(e){ alert(e); }
}

function render(){
    let t=document.getElementById("resultTable");
    t.innerHTML="<tr><th>✔</th><th>지점</th><th>조사높이</th><th>Δl</th><th>기울기</th><th>등급</th></tr>";
    dataList.forEach((d,i)=>{
        let r=t.insertRow();
        r.insertCell(0).innerHTML=`<input type="checkbox" value="${i}">`;
        r.insertCell(1).innerHTML=d.point;
        r.insertCell(2).innerHTML=d.조사높이;
        r.insertCell(3).innerHTML=d.deltaL;
        r.insertCell(4).innerHTML=d.slope;
        r.insertCell(5).innerHTML=d.grade;
    });
}

function deleteSelected(){
    let idx=[...document.querySelectorAll("input[type='checkbox']:checked")]
        .map(c=>parseInt(c.value));
    dataList=dataList.filter((_,i)=>!idx.includes(i));
    render();
}

function resetAll(){
    if(confirm("전체 삭제?")){
        dataList=[];
        render();
    }
}
</script>

</body>
</html>
