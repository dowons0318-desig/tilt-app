<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기울기 측정</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f4f6f8;
    margin:0;
    padding:4px;
    font-size:11px;
}
h3{margin:4px 0;font-size:14px;}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ccc;
    padding:2px;
    text-align:center;
    font-size:10px;
}

input{
    width:34px;
    padding:3px;
    font-size:11px;
    text-align:center;
    background:white;
    border:1px solid #ccc;
}

/* 🔢 숫자 스피너 제거 */
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{
    -webkit-appearance:none;
    margin:0;
}
input[type=number]{
    -moz-appearance:textfield;
}

.point{width:40px;}
.distance{width:55px;}

.btn-row{
    display:flex;
    gap:4px;
    margin-top:5px;
}

.btn-row button{
    flex:1;
    padding:8px 0;
    font-size:12px;
    border:none;
    border-radius:6px;
    font-weight:bold;
}

.add{background:#1976d2;color:white;}
.delete{background:#c62828;color:white;}
.reset{background:#424242;color:white;}

.result-wrap{
    overflow-x:auto;
    margin-top:6px;
}

h4{margin:4px 0;font-size:13px;}
</style>
</head>

<body>

<h3>📐 기울기 입력</h3>

<table>
<tr>
<th rowspan="2">지점</th>
<th rowspan="2">거리</th>
<th rowspan="2">구분</th>
<th colspan="3">수직</th>
<th colspan="3">수평</th>
</tr>
<tr>
<th>°</th><th>′</th><th>″</th>
<th>°</th><th>′</th><th>″</th>
</tr>

<tr>
<td rowspan="2"><input id="point" class="point"></td>
<td rowspan="2">
<input type="number" id="distance" class="distance" inputmode="decimal" step="0.001">
</td>
<td>Top</td>
<td><input id="vU_d" type="number" inputmode="numeric"></td>
<td><input id="vU_m" type="number" inputmode="numeric"></td>
<td><input id="vU_s" type="number" inputmode="numeric"></td>
<td><input id="hU_d" type="number" inputmode="numeric"></td>
<td><input id="hU_m" type="number" inputmode="numeric"></td>
<td><input id="hU_s" type="number" inputmode="numeric"></td>
</tr>

<tr>
<td>Bot</td>
<td><input id="vL_d" type="number" inputmode="numeric"></td>
<td><input id="vL_m" type="number" inputmode="numeric"></td>
<td><input id="vL_s" type="number" inputmode="numeric"></td>

<!-- 🔒 수평 Bot 고정 (색상 동일) -->
<td><input id="hL_d" value="0" readonly></td>
<td><input id="hL_m" value="0" readonly></td>
<td><input id="hL_s" value="0" readonly></td>
</tr>
</table>

<div class="btn-row">
<button class="add" onclick="addData()">추가</button>
<button class="delete" onclick="deleteSelected()">삭제</button>
<button class="reset" onclick="resetAll()">초기화</button>
</div>

<div class="result-wrap">
<h4>📊 결과</h4>
<table id="resultTable">
<tr>
<th>✔</th><th>지점</th><th>ΔH</th><th>ΔX</th><th>기울기</th><th>등급</th>
</tr>
</table>
</div>

<script>
let dataList=[];

window.onload=function(){
    let saved=localStorage.getItem("tiltData");
    if(saved){
        dataList=JSON.parse(saved);
        render();
    }

    // ⏎ 엔터 이동 기능
    let inputs=[...document.querySelectorAll("input:not([readonly])")];
    inputs.forEach((input,i)=>{
        input.addEventListener("keydown",function(e){
            if(e.key==="Enter"){
                e.preventDefault();
                if(i < inputs.length-1){
                    inputs[i+1].focus();
                }else{
                    addData();
                }
            }
        });
    });
};

function save(){
    localStorage.setItem("tiltData",JSON.stringify(dataList));
}

function dms(d,m,s){
    d=parseFloat(d)||0;
    m=parseFloat(m)||0;
    s=parseFloat(s)||0;
    if(m>=60||s>=60) throw "분/초 오류";
    return d+(m/60)+(s/3600);
}

function rad(d){return d*Math.PI/180;}

function addData(){
try{
    let P=point.value;
    let D=parseFloat(distance.value);
    if(!D) throw "거리 오류";

    let vU=dms(vU_d.value,vU_m.value,vU_s.value);
    let vL=dms(vL_d.value,vL_m.value,vL_s.value);
    let hU=rad(dms(hU_d.value,hU_m.value,hU_s.value));
    let hL=0;

    let aU=rad(90-vU);
    let aL=rad(90-vL);

    let dH=D*(Math.tan(aU)-Math.tan(aL));
    let dX=D*(Math.tan(hU)-Math.tan(hL));

    let slope=0,grade="A";

    if(Math.abs(dX)>0.000001){
        slope=dH/dX;
        let A=Math.abs(slope);
        if(A>=750) grade="A";
        else if(A>=500) grade="B";
        else if(A>=250) grade="C";
        else if(A>=150) grade="D";
        else grade="E";
    }else{
        dX=0;
        slope=0;
        grade="A";
    }

    dataList.push({
        point:P,
        deltaH:dH.toFixed(3),
        deltaX:dX.toFixed(3),
        slope:slope.toFixed(2),
        grade
    });

    save();
    render();
    document.querySelectorAll("input:not([readonly])").forEach(i=>i.value="");
    document.getElementById("point").focus();

}catch(e){
    alert("⚠ "+e);
}
}

function render(){
    dataList.sort((a,b)=>parseFloat(a.point)-parseFloat(b.point));
    let t=document.getElementById("resultTable");
    t.innerHTML="<tr><th>✔</th><th>지점</th><th>ΔH</th><th>ΔX</th><th>기울기</th><th>등급</th></tr>";
    dataList.forEach((d,i)=>{
        let r=t.insertRow();
        r.insertCell(0).innerHTML=`<input type="checkbox" value="${i}">`;
        r.insertCell(1).innerHTML=d.point;
        r.insertCell(2).innerHTML=d.deltaH;
        r.insertCell(3).innerHTML=d.deltaX;
        r.insertCell(4).innerHTML=d.slope;
        r.insertCell(5).innerHTML=d.grade;
    });
}

function deleteSelected(){
    let idx=[...document.querySelectorAll("input[type='checkbox']:checked")]
        .map(c=>parseInt(c.value));
    dataList=dataList.filter((_,i)=>!idx.includes(i));
    save();
    render();
}

function resetAll(){
    if(confirm("전체 삭제?")){
        dataList=[];
        localStorage.removeItem("tiltData");
        render();
    }
}
</script>

</body>
</html>
